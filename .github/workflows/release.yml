name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing GitHub release tag to upload artifacts to"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies and build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true
          shared-key: windows-tauri

      - name: Cache Tauri bundler tools
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\tauri
          key: tauri-bundler-tools-windows-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/tauri.conf.json', '.github/tauri-updater.conf.json') }}
          restore-keys: |
            tauri-bundler-tools-windows-${{ runner.os }}-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Check updater signing key
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::Set the TAURI_SIGNING_PRIVATE_KEY repository secret before publishing updater-capable Windows builds."
            exit 1
          fi

      - name: Build and upload Windows installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event.release.tag_name || inputs.tag }}
          releaseName: ${{ github.event.release.name || inputs.tag }}
          releaseBody: "Windows installer includes updater signature artifacts."
          releaseDraft: false
          prerelease: ${{ github.event.release.prerelease || false }}
          args: --bundles nsis --config .github/tauri-updater.conf.json
          includeUpdaterJson: true
